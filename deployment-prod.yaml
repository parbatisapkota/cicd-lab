apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: cithit/sapkotp2:latest        #<-- CHANGE THIS
        ports:
        - containerPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
spec:
  rules:
  - host:
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: prod-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prod-service
spec:
  type: LoadBalancer
  loadBalancerIP: 10.48.228.119                   #<-- CHANGE THIS
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  selector:
    app: nginx